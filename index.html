<script>
// ═══════════════════════════════════════════════════════
//  HEAD SAFETY NET — Error overlay + stub fallbacks
//  Must be FIRST script in <head>
// ═══════════════════════════════════════════════════════
(function() {
    "use strict";

    // ── Error Overlay ─────────────────────────────────────
    const errors = [];
    const MAX_ERRORS = 20;
    const MAX_DISPLAY = 10;

    window.addEventListener("error", function(e) {
        const file = e.filename ? e.filename.split("/").pop() : "?";
        const msg  = `${e.message || "Unknown error"} @ ${file}:${e.lineno || "?"}`;

        // Dedupe
        if (errors.includes(msg)) { e.preventDefault(); return true; }
        errors.push(msg);

        // Create or update overlay
        let div = document.getElementById("_errorOverlay");
        if (!div) {
            div = document.createElement("div");
            div.id = "_errorOverlay";
            div.style.cssText =
                "position:fixed;top:0;left:0;right:0;" +
                "background:#300;color:#fcc;font:11px monospace;" +
                "padding:8px;z-index:99999;max-height:35vh;" +
                "overflow:auto;border-bottom:2px solid #f00;" +
                "pointer-events:auto;cursor:pointer;";
            div.title = "Click to dismiss";
            div.addEventListener("click", function() {
                div.style.display = div.style.display === "none" ? "" : "none";
            });
            document.body.appendChild(div);
        }

        div.style.display = "";
        div.innerHTML =
            `<b>⚠ ERRORS (${errors.length}):</b> <small>(click to dismiss)</small><br>` +
            errors.slice(-MAX_DISPLAY).map(function(e) {
                return "• " + e;
            }).join("<br>");

        // Hard stop after too many unique errors
        if (errors.length >= MAX_ERRORS) {
            errors.push("STOPPED — too many errors");
            try { window.requestAnimationFrame = function() {}; } catch(_) {}
        }

        e.preventDefault();
        return true;
    });

    // Expose for debugging
    window._errors = errors;

    // ── Stub Fallbacks ────────────────────────────────────
    // These ensure no ReferenceError if a script loads out
    // of order or fails to load entirely.
    // Each real file REPLACES these when it loads.

    // Audio
    if (!window.AudioManager) {
        window.AudioManager = {
            initialized: false,
            init:function(){}, resume:function(){}, update:function(){},
            playSFX:function(){return null}, playVoice:function(){return null},
            playMusic:function(){}, stopMusic:function(){},
            setRoomAmbience:function(){}, stopAllAmbience:function(){},
            setMasterVolume:function(){}, setMusicVolume:function(){},
            setSFXVolume:function(){}, load:function(){},
        };
    }

    if (!window.AudioEngine) {
        window.AudioEngine = {
            initialized: false, ctx: null,
            init:function(){}, resume:function(){},
            playSFX:function(){}, playFlashlightFlicker:function(){},
            playAmbienceSound:function(){}, playNote:function(){},
            updateMusic:function(){}, updateAmbience:function(){},
            stopAll:function(){},
        };
    }

    if (!window.AudioWiring) {
        window.AudioWiring = {
            update:function(){}, reset:function(){},
            playFootstep:function(){}, playEndingMusic:function(){},
            playContextual:function(){}, playDelayed:function(){},
            playInteractSound:function(){}, playSealFound:function(){},
            playLevelUp:function(){}, playAchievement:function(){},
        };
    }

    if (!window.AudioTriggers) {
        window.AudioTriggers = {
            update:function(){}, reset:function(){},
        };
    }

    // Subtitle
    if (!window.SubtitleSystem) {
        window.SubtitleSystem = {
            messages: [], _pendingQueue: [],
            show:function(){}, update:function(){},
            draw:function(){}, clear:function(){},
        };
    }

    // Balance
    if (!window.Balance) {
        window.Balance = {
            masterUpdate:function(){}, reset:function(){}, apply:function(){},
            canInteract:function(){return true},
            getGhostDrainRate:function(){return 0.02},
            getSanityDrainRate:function(){return 0.003},
            getFlashlightDrainRate:function(){return 0.006},
            getMaxSanity:function(){return 100},
            getMaxHP:function(){return 100},
            getLoopDuration:function(){return 600},
            getEncounterChance:function(){return 0.15},
            getWeaponDamage:function(){return 5},
            getPlayerDamageReduction:function(){return 0},
            XP_SCALE: {},
        };
    }

    // Camera / Cinema
    if (!window.Camera) {
        window.Camera = {
            x:0, y:0, zoom:1, angle:0,
            update:function(){}, getTransform:function(cw,ch,rw,rh){
                var s = Math.min(cw/rw, ch/rh);
                return {scale:s, camX:0, camY:0, angle:0};
            },
            drawVignette:function(){}, drawGrain:function(){},
            scareZoom:function(){}, zoomTo:function(){},
            panTo:function(){}, pullBack:function(){},
            tilt:function(){}, reset:function(){},
        };
    }

    if (!window.SetPieces) {
        window.SetPieces = {
            active: null,
            update:function(){}, draw:function(){},
            drawOverlay:function(){}, reset:function(){},
        };
    }

    if (!window.DeathMemories) {
        window.DeathMemories = {
            ghosts: [],
            recordDeath:function(){}, draw:function(){},
            getNearestGhost:function(){return null},
            interactWithGhost:function(){},
            reset:function(){}, save:function(){return[]},
            load:function(){},
        };
    }

    // Flashlight / Soundtrack stubs
    if (!window.SoundtrackManager) {
        window.SoundtrackManager = { update:function(){} };
    }
    if (!window.FlashlightSystem) {
        window.FlashlightSystem = {
            update:function(){return 1},
            getRange:function(){return{range:200,alpha:0.5,coneAngle:0.5}},
        };
    }

    // Particles
    if (!window.particles)   window.particles  = [];
    if (!window.footprints)  window.footprints = [];

    // Particle functions
    if (typeof window.emitDust       !== "function") window.emitDust       = function(){};
    if (typeof window.emitFog        !== "function") window.emitFog        = function(){};
    if (typeof window.emitBlood      !== "function") window.emitBlood      = function(){};
    if (typeof window.emitEmbers     !== "function") window.emitEmbers     = function(){};
    if (typeof window.emitSpirit     !== "function") window.emitSpirit     = function(){};
    if (typeof window.emitTendril    !== "function") window.emitTendril    = function(){};
    if (typeof window.emitSparks     !== "function") window.emitSparks     = function(){};
    if (typeof window.emitScareText  !== "function") window.emitScareText  = function(){};
    if (typeof window.emitLevelUpParticles !== "function") window.emitLevelUpParticles = function(){};
    if (typeof window.updateParticles !== "function") window.updateParticles = function(){};
    if (typeof window.drawParticles   !== "function") window.drawParticles   = function(){};
    if (typeof window.trackFootprints !== "function") window.trackFootprints = function(){};
    if (typeof window.triggerShake    !== "function") window.triggerShake    = function(){};
    if (typeof window.getShakeOffset  !== "function") window.getShakeOffset  = function(){return{x:0,y:0}};
    if (typeof window.setupWeatherForRoom !== "function") window.setupWeatherForRoom = function(){};

    // Cinema functions
    if (typeof window.updateCinema !== "function") window.updateCinema = function(){};

    // Combat
    if (!window.combat) {
        window.combat = {
            active:false, bossActive:false,
            attackCooldown:0, dodgeActive:false, dodgeTimer:0,
            playerHP:100, maxHP:100,
            comboCount:0, comboTimer:0,
            playerDamageFlash:0, equippedWeapon:"fists",
            totalKills:0,
        };
    }

    // Story
    if (!window.StoryEngine) {
        window.StoryEngine = {
            update:function(){}, consequences:{dangerRooms:new Set()},
            currentChapter:"chapter_1", reset:function(){},
        };
    }

    // Missions
    if (!window.MissionSystem) {
        window.MissionSystem = {
            update:function(){}, reset:function(){},
            draw:function(){}, getActive:function(){return null},
        };
    }

    // NPC functions
    if (typeof window.initNPCs    !== "function") window.initNPCs    = function(){};
    if (typeof window.updateNPCs  !== "function") window.updateNPCs  = function(){};
    if (typeof window.drawNPCs    !== "function") window.drawNPCs    = function(){};
    if (typeof window.getNearestNPC !== "function") window.getNearestNPC = function(){return null};
    if (typeof window.resetNPCs   !== "function") window.resetNPCs   = function(){};

    // Common game functions
    if (typeof window.playSound         !== "function") window.playSound         = function(){};
    if (typeof window.showDialog        !== "function") window.showDialog        = function(){};
    if (typeof window.showDialogWithChoices !== "function") window.showDialogWithChoices = function(){};
    if (typeof window.addClue           !== "function") window.addClue           = function(){};
    if (typeof window.addItem           !== "function") window.addItem           = function(){};
    if (typeof window.hasItem           !== "function") window.hasItem           = function(){return false};
    if (typeof window.removeItem        !== "function") window.removeItem        = function(){};
    if (typeof window.giveXP            !== "function") window.giveXP            = function(){};
    if (typeof window.countSeals        !== "function") window.countSeals        = function(){return 0};
    if (typeof window.triggerMonologue  !== "function") window.triggerMonologue  = function(){};
    if (typeof window.getCurrentRoom    !== "function") window.getCurrentRoom    = function(){return null};
    if (typeof window.initAudio         !== "function") window.initAudio         = function(){};
    if (typeof window.installSubtitleOverride !== "function") window.installSubtitleOverride = function(){};

    // Global state stubs (game.js defines the real ones)
    if (typeof window.frame         === "undefined") window.frame         = 0;
    if (typeof window.gameState     === "undefined") window.gameState     = "menu";
    if (typeof window.dialogActive  === "undefined") window.dialogActive  = false;
    if (typeof window.journalOpen   === "undefined") window.journalOpen   = false;
    if (typeof window.transitionState === "undefined") window.transitionState = "none";
    if (typeof window.roomsVisited  === "undefined") window.roomsVisited  = new Set();

    // ROOMS stub (rooms.js replaces this immediately)
    if (!window.ROOMS) window.ROOMS = {};

    console.log("✓ Safety stubs ready (" + Object.keys(window).length + " globals)");
})();
</script>

<!-- Optional crash protection block is here -->
<script>
(function() {
    let frameCount = 0;
    let lastFrameTime = performance.now();
    let totalLagFrames = 0;

    const originalRAF = window.requestAnimationFrame.bind(window);
    window.requestAnimationFrame = function(callback) {
        return originalRAF(function(time) {
            const now = performance.now();
            const delta = now - lastFrameTime;
            lastFrameTime = now;

            if (delta > 100) {
                totalLagFrames++;
                if (totalLagFrames > 60) {
                    if (frameCount % 2 === 0) {
                        frameCount++;
                        return;
                    }
                }
            } else {
                totalLagFrames = Math.max(0, totalLagFrames - 1);
            }

            frameCount++;
            try {
                callback(time);
            } catch(e) {
                console.error("Frame error caught:", e);
            }
        });
    };

    let errorCount = 0;
    window.addEventListener("error", function(e) {
        errorCount++;
        if (errorCount > 50) {
            console.error("STOPPING: too many errors");
            window.requestAnimationFrame = function() {};
        }
        e.preventDefault();
        return true;
    });

    console.log("✓ Crash protection active");
})();
</script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
            .then((reg) => {
                console.log("Dark magic activated 🕯");

                // Pre-cache priority audio when idle
                if (reg.active && navigator.connection) {
                    // Only on wifi/ethernet — don't burn mobile data
                    const conn = navigator.connection;
                    if (conn.type === "wifi" || conn.type === "ethernet" ||
                        conn.effectiveType === "4g") {
                        reg.active.postMessage("precache-audio");
                    }
                } else if (reg.active) {
                    // No connection API — pre-cache anyway
                    reg.active.postMessage("precache-audio");
                }
            })
            .catch((err) => console.log("SW failed:", err));
    });
}
</script>
