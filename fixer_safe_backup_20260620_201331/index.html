// ═══════════════════════════════════════════════════════
//  HEAD SAFETY NET — Error overlay + stub fallbacks
//  Must be FIRST script in <head>
// ═══════════════════════════════════════════════════════
(function() {
    "use strict";

    // ── Error Overlay ─────────────────────────────────────
    const errors = [];
    const MAX_ERRORS = 20;
    const MAX_DISPLAY = 10;

    window.addEventListener("error", function(e) {
        const file = e.filename ? e.filename.split("/").pop() : "?";
        const msg  = `${e.message || "Unknown error"} @ ${file}:${e.lineno || "?"}`;

        // Dedupe
        if (errors.includes(msg)) { e.preventDefault(); return true; }
        errors.push(msg);

        // Create or update overlay
        let div = document.getElementById("_errorOverlay");
        if (!div) {
            div = document.createElement("div");
            div.id = "_errorOverlay";
            div.style.cssText =
                "position:fixed;top:0;left:0;right:0;" +
                "background:#300;color:#fcc;font:11px monospace;" +
                "padding:8px;z-index:99999;max-height:35vh;" +
                "overflow:auto;border-bottom:2px solid #f00;" +
                "pointer-events:auto;cursor:pointer;";
            div.title = "Click to dismiss";
            div.addEventListener("click", function() {
                div.style.display = div.style.display === "none" ? "" : "none";
            });
            document.body.appendChild(div);
        }

        div.style.display = "";
        div.innerHTML =
            `<b>⚠ ERRORS (${errors.length}):</b> <small>(click to dismiss)</small><br>` +
            errors.slice(-MAX_DISPLAY).map(function(e) {
                return "• " + e;
            }).join("<br>");

        // Hard stop after too many unique errors
        if (errors.length >= MAX_ERRORS) {
            errors.push("STOPPED — too many errors");
            try { window.requestAnimationFrame = function() {}; } catch(_) {}
        }

        e.preventDefault();
        return true;
    });

    // Expose for debugging
    window._errors = errors;

    // ── Stub Fallbacks ────────────────────────────────────
    // These ensure no ReferenceError if a script loads out
    // of order or fails to load entirely.
    // Each real file REPLACES these when it loads.

    // Audio
    if (!window.AudioManager) {
        window.AudioManager = {
            initialized: false,
            init:function(){}, resume:function(){}, update:function(){},
            playSFX:function(){return null}, playVoice:function(){return null},
            playMusic:function(){}, stopMusic:function(){},
            setRoomAmbience:function(){}, stopAllAmbience:function(){},
            setMasterVolume:function(){}, setMusicVolume:function(){},

    if (!window.AudioEngine) {

    if (!window.MissionSystem) {

    // NPC functions
    if (typeof window.initNPCs    !== "function") window.initNPCs    = function(){};

    if (typeof window.initAudio         !== "function") window.initAudio         = function(){};
    if (typeof window.installSubtitleOverride !== "function") window.installSubtitleOverride = function(){};

    // ── AI System Stub (replaced by ai.js when it loads) ──
    if (!window.AI) {

<!--  CRASH PROTECTION                                              -->
<!-- ═════════════════════════════════════════════════════════════ -->
<script>
(function() {
    let frameCount = 0;
    let lastFrameTime = performance.now();
    let totalLagFrames = 0;

    const originalRAF = window.requestAnimationFrame.bind(window);
    window.requestAnimationFrame = function(callback) {
        return originalRAF(function(time) {
            const now = performance.now();
            const delta = now - lastFrameTime;
            lastFrameTime = now;

            if (delta > 100) {
                totalLagFrames++;
                if (totalLagFrames > 60) {
                    if (frameCount % 2 === 0) {
                        frameCount++;
                        return;
                    }
                }
            } else {
                totalLagFrames = Math.max(0, totalLagFrames - 1);
            }

            frameCount++;
            try {
                callback(time);
            } catch(e) {
                console.error("Frame error caught:", e);
            }
        });
    };

    let errorCount = 0;
    window.addEventListener("error", function(e) {
        errorCount++;
        if (errorCount > 50) {
            console.error("STOPPING: too many errors");
            window.requestAnimationFrame = function() {};
        }
        e.preventDefault();
        return true;
    });

    console.log("✓ Crash protection active");
})();
</script>

<!-- ═════════════════════════════════════════════════════════════ -->
<script>
(function() {
    "use strict";

    const PHONE_THRESHOLD = 4;
    let score = 0;
    const evidence = [];

    const UA = navigator.userAgent || "";
    const PHONE_UA = /Android(?!.*Tablet).*Mobile|iPhone|iPod|Windows Phone|BlackBerry|BB10|Opera Mini|IEMobile|Mobile.*Firefox/i;
    const TABLET_UA = /iPad|Android(?!.*Mobile)|Tablet|Kindle|Silk|PlayBook/i;

    if (PHONE_UA.test(UA) && !TABLET_UA.test(UA)) {
        score++;
        evidence.push("UA:phone");
    } else if (TABLET_UA.test(UA)) {
        evidence.push("UA:tablet(excluded)");
    } else {
        evidence.push("UA:desktop");
    }

    const maxTouch = navigator.maxTouchPoints || 0;
    if (maxTouch >= 5) {
        score++;
        evidence.push("Touch:" + maxTouch);
    } else {
        evidence.push("Touch:" + maxTouch + "(low)");
    }

    const dpr = window.devicePixelRatio || 1;
    const physW = screen.width / dpr;
    const physH = screen.height / dpr;
    const shortSide = Math.min(physW, physH);

    if (shortSide <= 480 && shortSide >= 280) {
        score++;
        evidence.push("ScreenShort:" + Math.round(shortSide) + "px(phone)");
    } else if (shortSide > 600) {
        evidence.push("ScreenShort:" + Math.round(shortSide) + "px(tablet/desktop)");
    } else {
        evidence.push("ScreenShort:" + Math.round(shortSide) + "px(borderline)");
    }

    const hasCoarse = window.matchMedia("(pointer: coarse)").matches;
    const hasFine = window.matchMedia("(pointer: fine)").matches;
    const hasHover = window.matchMedia("(hover: hover)").matches;

    if (hasCoarse && !hasFine && !hasHover) {
        score++;
        evidence.push("Pointer:coarse-only");
    } else if (hasCoarse && hasFine) {
        evidence.push("Pointer:coarse+fine(hybrid)");
    } else {
        evidence.push("Pointer:fine(mouse)");
    }

    if (dpr >= 2 && shortSide <= 480) {
        score++;
        evidence.push("DPR:" + dpr + "(phone-range)");
    } else {
        evidence.push("DPR:" + dpr + "(not decisive)");
    }

    const hasOrientation = (
        typeof window.orientation !== "undefined" ||
        (typeof screen.orientation !== "undefined" &&
         typeof screen.orientation.type === "string")
    );
    if (hasOrientation && maxTouch > 0) {
        score++;
        evidence.push("Orientation:supported");
    } else {
        evidence.push("Orientation:absent");
    }

    const plat = (navigator.platform || "").toLowerCase();
    const isIOSPhone = /iphone|ipod/.test(plat);
    const isAndroidArm = /linux arm|linux aarch/.test(plat) && maxTouch > 0;
    const isIOSUA = /iPhone|iPod/.test(UA);

    if (isIOSPhone || isAndroidArm || isIOSUA) {
        score++;
        evidence.push("Platform:phone");
    } else {
        evidence.push("Platform:" + (plat || "unknown"));
    }

    const IS_PHONE = score >= PHONE_THRESHOLD;

    window._mobileDetection = {
        isPhone: IS_PHONE,
        score: score,
        threshold: PHONE_THRESHOLD,
        evidence: evidence,
        dpr: dpr,
        shortSide: shortSide,
    };

    if (IS_PHONE) {
        console.log(
            "[Mobile] Phone detected (score " + score + "/" + PHONE_THRESHOLD + "). " +
            "Loading touch controls. Evidence: " + evidence.join(", ")
        );
        var s = document.createElement("script");
        s.src = "mobile.js";
        s.async = false;
        document.currentScript
            ? document.currentScript.parentNode.insertBefore(s, document.currentScript.nextSibling)
            : document.body.appendChild(s);
    } else {
        console.log(
            "[Mobile] Non-phone device (score " + score + "/" + PHONE_THRESHOLD + "). " +
            "Touch controls disabled. Evidence: " + evidence.join(", ")
        );
    }
})();
</script>

    try { installSubtitleOverride(); } catch(e) {
        console.warn("[init] installSubtitleOverride failed:", e);
    }

<!--  SERVICE WORKER — Offline Play                                 -->
<!-- ═════════════════════════════════════════════════════════════ -->
<script>
if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js")
            .then(function(reg) {
                console.log("[SW] Registered");
                // Force new SW to activate immediately
                if (reg.waiting) {
                    reg.waiting.postMessage("skip-waiting");
                }
                reg.addEventListener("updatefound", function() {
                    var newSW = reg.installing;
                    if (!newSW) return;
                    newSW.addEventListener("statechange", function() {
                        if (newSW.state === "installed" && navigator.serviceWorker.controller) {
                            newSW.postMessage("skip-waiting");
                        }
                    });
                });
                // Reload once when new SW takes over
                var refreshing = false;
                navigator.serviceWorker.addEventListener("controllerchange", function() {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
                // Listen for SW messages
                navigator.serviceWorker.addEventListener("message", function(event) {
                    var data = event.data;
                    if (!data) return;
                    if (data.type === "sw-install-complete") {
                        console.log("[SW] All files cached — fully offline ready");
                    }
                    if (data.type === "performance-mode") {
                        console.log("[SW] Device tier: " + data.mode);
                        try {
                            if (typeof window._applyPerfHints === "function") {
                                window._applyPerfHints(data.hints);
                            }
                        } catch (e) {}
                    }
                });
            })
            .catch(function(err) { console.error("[SW] Registration failed:", err); });
    }
</script>
